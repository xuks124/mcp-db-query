name: Build CuaHelper APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
      - name: Install Android SDK
        run: |
          mkdir -p $ANDROID_HOME/cmdline-tools
          cd /tmp
          curl -sLo cmdline-tools.zip https://dl.google.com/android/repository/commandlinetools-linux-11076708_latest.zip
          unzip -q cmdline-tools.zip -d $ANDROID_HOME/cmdline-tools/
          mv $ANDROID_HOME/cmdline-tools/cmdline-tools $ANDROID_HOME/cmdline-tools/latest
          export PATH=$ANDROID_HOME/cmdline-tools/latest/bin:$PATH
          yes | sdkmanager "platforms;android-34" "build-tools;34.0.0" 2>&1 | tail -5
        env:
          ANDROID_HOME: ${{ github.workspace }}/android-sdk
      - name: Build APK
        run: |
          export ANDROID_HOME=${{ github.workspace }}/android-sdk
          echo "sdk.dir=$ANDROID_HOME" > cua-helper/local.properties
          cd cua-helper
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon 2>&1
        env:
          ANDROID_HOME: ${{ github.workspace }}/android-sdk
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: cua-helper-debug
          path: cua-helper/app/build/outputs/apk/debug/*.apk
