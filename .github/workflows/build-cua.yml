name: Build
on:
  push:
    branches: [ main ]
  workflow_dispatch:
jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - name: Build
        run: |
          sudo -S -p '' apt-get update -qq
          sudo -S -p '' apt-get install -y -qq openjdk-17-jdk unzip
          mkdir -p $HOME/android-sdk/cmdline-tools
          cd /tmp
          curl -sLo cmdline-tools.zip https://dl.google.com/android/repository/commandlinetools-linux-11076708_latest.zip
          unzip -q cmdline-tools.zip -d $HOME/android-sdk/cmdline-tools/
          mv $HOME/android-sdk/cmdline-tools/cmdline-tools $HOME/android-sdk/cmdline-tools/latest
          export ANDROID_HOME=$HOME/android-sdk
          export PATH=$ANDROID_HOME/cmdline-tools/latest/bin:$PATH
          yes | sdkmanager "platforms;android-34" "build-tools;34.0.0" > /dev/null
          echo "sdk.dir=$ANDROID_HOME" > cua-helper/local.properties
          cd cua-helper
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon 2>&1 | tail -30
      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: apk
          path: cua-helper/app/build/outputs/apk/debug/*.apk
