name: Build CuaHelper APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
      - name: Build APK
        run: |
          cd cua-helper
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: cua-helper-debug
          path: cua-helper/app/build/outputs/apk/debug/*.apk
      - name: Create Release
        run: |
          gh release create v1.2 cua-helper/app/build/outputs/apk/debug/*.apk \
            --repo xuks124/mcp-db-query \
            --title "CuaHelper v1.2" \
            --notes "添加截图权限按钮" \
            --target ${{ github.sha }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
