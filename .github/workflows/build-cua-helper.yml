name: Build CUA Helper APK

on:
  push:
    branches: [ main ]
    paths:
      - 'cua-helper/**'
      - '.github/workflows/build-cua-helper.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
        with:
          packages: 'platforms;android-34 build-tools;34.0.0'

      - name: Build APK
        run: |
          # Verify source has our changes
          echo "=== Source verification ==="
          grep -c "captureScreen" cua-helper/app/src/main/java/com/hermes/cua/CuaAccessibilityService.java || echo "MISSING!"
          grep -c "accService.captureScreen" cua-helper/app/src/main/java/com/hermes/cua/CuaService.java || echo "MISSING!"

          cd cua-helper
          chmod +x gradlew
          # Nuke gradle caches
          rm -rf ~/.gradle/caches/ ~/.gradle/daemon/
          ./gradlew clean assembleDebug --no-daemon --no-build-cache --rerun-tasks 2>&1 | tail -30
          echo "=== APKs ==="
          find . -name "*.apk" -type f -exec ls -la {} \;
          
          # Verify DEX
          APK=$(find . -name "*.apk" -type f | head -1)
          echo "=== DEX verification ==="
          unzip -p "$APK" classes*.dex | strings | grep -c "captureScreen" && echo "captureScreen FOUND" || echo "captureScreen MISSING"

      - name: Push APK to apk branch
        run: |
          APK=$(find cua-helper -name "*.apk" -type f | head -1)
          if [ -z "$APK" ]; then echo "No APK!"; exit 1; fi
          cp "$APK" /tmp/CuaHelper.apk
          echo "APK size: $(stat -c%s /tmp/CuaHelper.apk) bytes"

          git config user.name "github-actions[bot]"
          git config user.email "actions@github.com"

          if git ls-remote --heads origin apk | grep -q apk; then
            git fetch origin apk
            git checkout apk
            rm -f CuaHelper.apk
          else
            git checkout --orphan apk
            git rm -rf . 2>/dev/null || true
          fi

          cp /tmp/CuaHelper.apk ./CuaHelper.apk
          git add CuaHelper.apk
          git commit -m "build: $(date -u +%Y%m%d-%H%M%S)" || echo "No changes"
          git push origin apk --force
          echo "Done!"
