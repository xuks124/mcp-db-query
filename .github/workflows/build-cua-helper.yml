name: Build CUA Helper APK

on:
  push:
    branches: [ main ]
    paths:
      - 'cua-helper/**'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        run: |
          yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager             "platforms;android-34" "build-tools;34.0.0" 2>&1 | tail -5

      - name: Build APK
        run: |
          cd cua-helper
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon 2>&1 | tail -30
          echo "=== APKs found ==="
          find . -name "*.apk" -type f

      - name: Commit APK to apk branch
        run: |
          APK=$(find cua-helper -name "*.apk" -type f | head -1)
          if [ -z "$APK" ]; then
            echo "No APK found!"
            exit 1
          fi
          echo "APK: $APK ($(stat -c%s "$APK") bytes)"

          # Extract APK to clean location
          cp "$APK" /tmp/CuaHelper.apk

          # Switch to or create apk branch
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          # Fetch existing apk branch if it exists
          git fetch origin apk 2>/dev/null || true

          if git ls-remote --heads origin apk | grep -q apk; then
            git checkout -b apk origin/apk
          else
            git checkout --orphan apk
            git rm -rf . 2>/dev/null || true
          fi

          # Clear old files and put new APK
          rm -rf ./*
          cp /tmp/CuaHelper.apk ./CuaHelper.apk
          git add CuaHelper.apk
          git commit -m "build: CuaHelper APK $(date -u +%Y%m%d-%H%M%S)"
          git push origin apk --force
          echo "APK pushed to apk branch"
