name: Build CUA Helper APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
        with:
          api-level: 34
          build-tools: 34.0.0

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: "8.5"

      - name: Build APK
        env:
          ANDROID_HOME: /usr/local/lib/android/sdk
          ANDROID_SDK_ROOT: /usr/local/lib/android/sdk
        run: |
          cd cua-helper
          echo "=== ANDROID_HOME = $ANDROID_HOME ==="
          echo "=== JAVA_HOME = $JAVA_HOME ==="
          ls -la $ANDROID_HOME/platforms/ 2>/dev/null || echo "No platforms dir"
          ls -la $ANDROID_HOME/build-tools/ 2>/dev/null || echo "No build-tools dir"
          # Generate proper gradle wrapper
          gradle wrapper --gradle-version=8.5 2>&1
          echo "=== WRAPPER GENERATED ==="
          export ANDROID_HOME=$ANDROID_SDK_ROOT
          export ANDROID_SDK_ROOT=$ANDROID_SDK_ROOT
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon --stacktrace 2>&1
          EXIT_CODE=$?
          echo "=== EXIT CODE: $EXIT_CODE ==="
          if [ $EXIT_CODE -ne 0 ]; then exit $EXIT_CODE; fi
          echo "=== LOOKING FOR APKS ==="
          find . -name "*.apk" -type f
          for f in $(find . -name "app-debug.apk" -type f); do
            mv "$f" "$(dirname $f)/CuaHelper.apk"
          done

      - name: Upload APK (artifact)
        uses: actions/upload-artifact@v4
        with:
          name: CuaHelper-APK
          path: |
            cua-helper/app/build/outputs/apk/debug/CuaHelper.apk
          if-no-files-found: error

      - name: Create Release and Upload APK
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          APK=$(find cua-helper -name "*.apk" -type f | head -1)
          if [ -z "$APK" ]; then
            echo "No APK found!"
            exit 1
          fi
          echo "Found APK: $APK"
          echo "APK size: $(stat -c%s "$APK") bytes"
          gh release delete apk-v1.0 --yes 2>/dev/null || true
          git push origin --delete refs/tags/apk-v1.0 2>/dev/null || true
          gh release create apk-v1.0 \
            --title "CuaHelper APK v1.0" \
            --notes "点 CuaHelper.apk 下载安装即可使用" \
            "$APK#CuaHelper.apk"
          echo "Release created: https://github.com/${{ github.repository }}/releases/tag/apk-v1.0"
