name: Build CUA Helper APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        run: |
          echo "ANDROID_HOME=$ANDROID_HOME"
          ls $ANDROID_HOME/platforms/ 2>/dev/null || echo "No platforms dir"
          yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager \
            "platforms;android-34" "build-tools;34.0.0" 2>&1 | tail -5

      - name: Build APK
        run: |
          cd cua-helper
          export ANDROID_HOME=/usr/local/lib/android/sdk
          gradle wrapper --gradle-version 8.2
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon --stacktrace 2>&1
          echo "=== Looking for APK files ==="
          find . -name "*.apk" -type f
          echo "=== Build output dir ==="
          ls -laR app/build/outputs/ 2>/dev/null | head -30

      - name: Upload APK (artifact)
        uses: actions/upload-artifact@v4
        with:
          name: CuaHelper-APK
          path: |
            cua-helper/app/build/outputs/apk/release/*.apk
            cua-helper/app/build/outputs/apk/debug/*.apk
          if-no-files-found: warn

      - name: Create Release and Upload APK
        run: |
          set -e
          APK=$(find cua-helper -name "*.apk" -type f | head -1)
          if [ -z "$APK" ]; then
            echo "No APK found!"
            exit 1
          fi
          echo "Found APK: $APK"
          echo "APK size: $(stat -c%s "$APK") bytes"

          # Delete old release if exists
          OLD_ID=$(curl -s -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
            "https://api.github.com/repos/${{ github.repository }}/releases/tags/apk-v1.0" | \
            python3 -c "import sys,json; d=json.load(sys.stdin); print(d.get('id',''))" 2>/dev/null || echo "")
          if [ -n "$OLD_ID" ]; then
            echo "Deleting old release $OLD_ID..."
            curl -s -X DELETE -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
              "https://api.github.com/repos/${{ github.repository }}/releases/$OLD_ID"
          fi
          # Delete old tag
          git push origin :refs/tags/apk-v1.0 2>/dev/null || true

          # Create new release
          echo "Creating new release..."
          curl -s -X POST -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
            -H "Content-Type: application/json" \
            -d '{"tag_name":"apk-v1.0","name":"CuaHelper APK v1.0","body":"点 CuaHelper.apk 下载安装即可使用","draft":false,"prerelease":false}' \
            "https://api.github.com/repos/${{ github.repository }}/releases" > /tmp/release.json
          RELEASE_ID=$(python3 -c "import json; print(json.load(open('/tmp/release.json')).get('id',''))")
          echo "Release ID: $RELEASE_ID"

          # Upload APK to release
          echo "Uploading APK..."
          curl -s -X POST -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
            -H "Content-Type: application/vnd.android.package-archive" \
            "https://uploads.github.com/repos/${{ github.repository }}/releases/$RELEASE_ID/assets?name=CuaHelper.apk" \
            --data-binary @"$APK" > /tmp/upload.json
          UPLOAD_RESULT=$(python3 -c "import json; d=json.load(open('/tmp/upload.json')); print(d.get('name','FAILED'))")
          echo "Upload result: $UPLOAD_RESULT"
