name: Build CUA Helper APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        run: |
          # Android SDK is pre-installed on ubuntu-latest runners
          echo "ANDROID_HOME=$ANDROID_HOME"
          ls $ANDROID_HOME/platforms/ 2>/dev/null || echo "No platforms dir"
          # Install required SDK platform if not present
          yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager \
            "platforms;android-34" "build-tools;34.0.0" 2>&1 | tail -5

      - name: Build APK
        run: |
          cd cua-helper
          export ANDROID_HOME=/usr/local/lib/android/sdk
          # Generate wrapper
          gradle wrapper --gradle-version 8.2
          chmod +x gradlew
          # Build
          ./gradlew assembleRelease --no-daemon --stacktrace 2>&1
          echo "=== Looking for APK files ==="
          find . -name "*.apk" -type f
          echo "=== Build output dir ==="
          ls -laR app/build/outputs/ 2>/dev/null | head -30

      - name: Upload APK (artifact)
        uses: actions/upload-artifact@v4
        with:
          name: CuaHelper-APK
          path: |
            cua-helper/app/build/outputs/apk/release/*.apk
            cua-helper/app/build/outputs/apk/debug/*.apk
          if-no-files-found: warn

      - name: Upload APK to Release
        uses: ncipollo/release-action@v1
        with:
          tag: apk-v1.0
          name: "CuaHelper APK v1.0"
          body: "Hermes CUA Helper - Android 手机控制 APK\n下载 CuaHelper.apk 安装即可使用"
          artifacts: |
            cua-helper/app/build/outputs/apk/release/*.apk
            cua-helper/app/build/outputs/apk/debug/*.apk
          token: ${{ secrets.GITHUB_TOKEN }}
          allowUpdates: true
          replacesArtifacts: true
