name: Build CUA Helper APK

on:
  push:
    paths:
      - 'cua-helper/**'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Build APK with Gradle
        run: |
          cd cua-helper
          # Install Gradle and generate wrapper
          apt-get update && apt-get install -y gradle 2>/dev/null || true
          gradle wrapper --gradle-version 8.2 2>/dev/null || \
            curl -sL "https://services.gradle.org/distributions/gradle-8.2-bin.zip" -o /tmp/gradle.zip && \
            unzip -q /tmp/gradle.zip -d /tmp/gradle && \
            /tmp/gradle/gradle-8.2/bin/gradle wrapper --gradle-version 8.2
          chmod +x gradlew
          ./gradlew assembleRelease --stacktrace 2>&1

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: CuaHelper-APK
          path: cua-helper/app/build/outputs/apk/release/*.apk
