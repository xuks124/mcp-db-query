name: Build CUA Helper APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Build APK
        run: |
          cd cua-helper
          # Download proper gradle wrapper
          curl -sL -o /tmp/gradle-bin.zip \
            "https://services.gradle.org/distributions/gradle-8.2-bin.zip"
          unzip -q -o /tmp/gradle-bin.zip -d /tmp/gradle/
          export PATH="/tmp/gradle/gradle-8.2/bin:$PATH"
          gradle wrapper --gradle-version 8.2
          chmod +x gradlew
          ./gradlew assembleRelease --no-daemon --stacktrace 2>&1

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: CuaHelper-APK
          path: cua-helper/**/*.apk
          if-no-files-found: error
