name: Build CUA Helper APK

on:
  push:
    paths:
      - 'cua-helper/**'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Build APK
        run: |
          cd cua-helper
          chmod +x gradlew 2>/dev/null || true
          ./gradlew assembleRelease

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: CuaHelper-APK
          path: cua-helper/app/build/outputs/apk/release/*.apk
