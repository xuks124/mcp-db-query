name: Build CUA Helper APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
        with:
          cmdline-tools-version: 9477386
          log-accepted-android-sdk-licenses: false

      - name: Install SDK components
        run: |
          sdkmanager "platforms;android-34" "build-tools;34.0.0" 2>&1 | tail -5

      - name: Build APK
        run: |
          cd cua-helper
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon --stacktrace 2>&1
          echo "=== Looking for APK files ==="
          find . -name "*.apk" -type f
          for f in $(find . -name "app-debug.apk" -type f); do
            mv "$f" "$(dirname $f)/CuaHelper.apk"
            echo "Renamed: $f -> $(dirname $f)/CuaHelper.apk"
          done

      - name: Upload APK (artifact)
        uses: actions/upload-artifact@v4
        with:
          name: CuaHelper-APK
          path: |
            cua-helper/app/build/outputs/apk/debug/CuaHelper.apk
          if-no-files-found: warn

      - name: Create Release and Upload APK
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -e
          APK=$(find cua-helper -name "*.apk" -type f | head -1)
          if [ -z "$APK" ]; then
            echo "No APK found!"
            exit 1
          fi
          echo "Found APK: $APK"
          echo "APK size: $(stat -c%s "$APK") bytes"
          gh release delete apk-v1.0 --yes 2>/dev/null || true
          git push origin --delete refs/tags/apk-v1.0 2>/dev/null || true
          gh release create apk-v1.0 \
            --title "CuaHelper APK v1.0" \
            --notes "点 CuaHelper.apk 下载安装即可使用" \
            "$APK#CuaHelper.apk"
          echo "Release created: https://github.com/${{ github.repository }}/releases/tag/apk-v1.0"
